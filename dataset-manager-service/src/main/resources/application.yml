spring:
  application:
    name: dataset-manager-service
  config:
    import: optional:configserver:http://localhost:8888
  # Fallback si config-server indisponible
  datasource:
    url: jdbc:h2:mem:managerdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
