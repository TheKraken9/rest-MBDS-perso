server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native          # lit les configs depuis le classpath (pas de Git)
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config/

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
