server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # file:/config-repo/ = volume Docker monté à la racine du projet
          # classpath:/config/ = fallback pour dev local (IntelliJ)
          search-locations: file:/config-repo/,classpath:/config/

eureka:
  client:
    service-url:
      defaultZone: ${DISCOVERY_SERVICE_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,refresh
