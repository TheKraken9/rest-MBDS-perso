services:

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    expose:
      - "8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 10

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    expose:
      - "8888"
    volumes:
      - ./config-repo:/config-repo
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      - DISCOVERY_SERVICE_URL=http://eureka-server:8761/eureka
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 10

  dataset-manager-service:
    build: ./dataset-manager-service
    container_name: dataset-manager-service
    ports:
      - "8081:8081"
    expose:
      - "8081"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      - DISCOVERY_SERVICE_URL=http://eureka-server:8761/eureka
      - CONFIG_SERVICE_URL=http://config-server:8888
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 10

  generator-service:
    build: ./generator-service
    container_name: generator-service
    ports:
      - "8082:8082"
    expose:
      - "8082"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      - DISCOVERY_SERVICE_URL=http://eureka-server:8761/eureka
      - CONFIG_SERVICE_URL=http://config-server:8888
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    expose:
      - "8080"
    depends_on:
      dataset-manager-service:
        condition: service_healthy
      generator-service:
        condition: service_healthy
    environment:
      - DISCOVERY_SERVICE_URL=http://eureka-server:8761/eureka
      - CONFIG_SERVICE_URL=http://config-server:8888
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
