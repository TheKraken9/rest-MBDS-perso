server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: ${DISCOVERY_SERVICE_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      dataset-manager:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
  timelimiter:
    instances:
      dataset-manager:
        # 3s was too aggressive for preview/export flows that call remote APIs.
        # Keep this slightly below the API-Gateway response-timeout (30s) to fail upstream first.
        timeout-duration: 25s
        cancel-running-future: true
