server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:${CONFIG_SERVICE_URL:http://localhost:8888}
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            # Fail-fast si le service est DOWN (connexion refusée = 2s max)
            connect-timeout: 2000
            # Laisser le temps aux services de répondre (JVM warmup = lent au démarrage)
            response-timeout: 30s
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: dataset-manager-projects
              uri: lb://dataset-manager-service
              predicates:
                - Path=/api/projects,/api/projects/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: dataset-manager-gw
                    fallbackUri: forward:/fallback/dataset-manager
            - id: dataset-manager-entities
              uri: lb://dataset-manager-service
              predicates:
                - Path=/api/entities,/api/entities/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: dataset-manager-gw
                    fallbackUri: forward:/fallback/dataset-manager
            - id: generator
              uri: lb://generator-service
              predicates:
                - Path=/api/generator,/api/generator/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: generator-gw
                    fallbackUri: forward:/fallback/generator

resilience4j:
  circuitbreaker:
    instances:
      dataset-manager-gw:
        sliding-window-size: 20
        minimum-number-of-calls: 20
        failure-rate-threshold: 80
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
      generator-gw:
        sliding-window-size: 20
        minimum-number-of-calls: 20
        failure-rate-threshold: 80
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
  # Pas de timelimiter : en WebFlux réactif, les timeouts HTTP (connect/response)
  # suffisent. Un timelimiter court déclenche de faux positifs sur les premiers
  # appels à froid (JVM warmup).

eureka:
  client:
    service-url:
      defaultZone: ${DISCOVERY_SERVICE_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
